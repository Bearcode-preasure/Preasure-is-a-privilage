  <title>Halaman Tidak Ditemukan — Pressure is a Privilege</title>
  <meta name="robots" content="noindex, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --bg: #f4f1ea; --bg-dark: #1a1814; --ink: #1a1814; --ink-soft: #4a443a;
      --accent: #c8472a; --accent-soft: #e89478; --paper: #ebe5d8;
      --line: rgba(26, 24, 20, 0.12);
      --serif: 'Fraunces', Georgia, serif;
      --serif-italic: 'Instrument Serif', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      background: var(--bg); color: var(--ink); font-family: var(--serif);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      z-index: 1000; opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
    }
    .container { max-width: 600px; }
    .error-code {
      font-family: var(--serif-italic); font-style: italic;
      font-size: clamp(80px, 18vw, 180px);
      color: var(--accent); line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-family: var(--serif); font-weight: 300;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1; letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    h1 em { font-family: var(--serif-italic); color: var(--accent); }
    p {
      font-family: var(--serif-italic); font-style: italic;
      font-size: 20px; color: var(--ink-soft);
      line-height: 1.5; margin-bottom: 40px;
    }
    .home-link {
      display: inline-block;
      padding: 16px 36px;
      background: var(--ink); color: var(--bg);
      font-family: var(--mono); font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; transition: all 0.3s;
      border: 1px solid var(--ink);
    }
    .home-link:hover { background: var(--accent); border-color: var(--accent); }
    .quote {
      margin-top: 60px; padding-top: 40px;
      border-top: 1px solid var(--line);
      font-family: var(--serif-italic); font-style: italic;
      font-size: 16px; color: var(--ink-soft);
    }
  </style>
